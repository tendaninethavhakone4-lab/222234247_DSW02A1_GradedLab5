<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Mr. Surname Blender</title>
    <!-- surname.js must be in the same folder as this HTML file -->
    <script type="text/javascript" src="surname.js"></script>
    <style>
        /* ── General layout ── */
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            max-width: 620px;
        }

        h1 {
            font-size: 1.3rem;
            border: 2px solid #333;
            display: inline-block;
            padding: 5px 16px;
            margin-bottom: 12px;
        }

        div {
            margin-bottom: 8px;
        }

        span {
            display: inline-block;
            width: 110px;
            font-size: 0.95rem;
        }

        input[type="text"],
        select {
            padding: 3px 6px;
            font-size: 0.95rem;
        }

        /* ── Blend Now button ── */
        #blend-btn {
            background: #4a90d9;
            color: #fff;
            border: none;
            padding: 5px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 3px;
        }

        #blend-btn:hover { background: #357abd; }

        /* ── Apply Style button ── */
        #apply-btn {
            background: #e07b20;
            color: #fff;
            border: none;
            padding: 5px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 3px;
            margin-left: 6px;
        }

        #apply-btn:hover { background: #b85f10; }

        /* ── Output area ── */
        #output {
            position: relative;    /* required so child spans can be absolutely positioned */
            width: 340px;
            height: 200px;
            border: 1px solid #999;
            margin-top: 10px;
            overflow: visible;     /* letters may extend beyond — requirement says don't worry */
            background: #fafafa;
        }

        /* ── Slider rows ── */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .slider-row label {
            width: 120px;
            font-size: 0.88rem;
        }

        .slider-row input[type="range"] { width: 160px; }

        .slider-val {
            font-size: 0.85rem;
            color: #555;
            width: 38px;
        }
    </style>
</head>
<body>

    <!-- ── Title ─────────────────────────────────────────────────── -->
    <h1>Mr. Surname Blender</h1>

    <!-- ── Surname input ─────────────────────────────────────────── -->
    <div>
        <span>Surname:</span>
        <input id="surname" type="text" size="20" placeholder="e.g. Mabokela" />
    </div>

    <!-- ── Font selection ────────────────────────────────────────── -->
    <div>
        <span>Font:</span>
        <select id="font">
            <option value="Arial">Arial</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Verdana">Verdana</option>
        </select>
    </div>

    <!-- ── Position radio buttons ────────────────────────────────── -->
    <div>
        <span>Position:</span>
        <input id="sequential" name="pos" type="radio" value="seq" checked="checked" />Sequential
        <input id="random"     name="pos" type="radio" value="rand" /> Random
        <input id="reverse"    name="pos" type="radio" value="rev"  /> Reverse
    </div>

    <!-- ── Colour dropdown (Black / Red / Blue / Green) ──────────── -->
    <div>
        <span>Text Color:</span>
        <select id="color-select">
            <option value="black">Black</option>
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
        </select>

        <!-- Color picker (synced to the dropdown above) -->
        <input type="color" id="color-picker" value="#000000" title="Pick a custom colour" />
    </div>

    <!-- ── Font size input ───────────────────────────────────────── -->
    <div>
        <span>Font Size:</span>
        <input type="number" id="font-size" placeholder="font size" value="16" min="6" max="72" style="width:60px;" />
        px
        <button id="apply-btn">Apply Style</button>
    </div>

    <!-- ── Letter-spacing slider ─────────────────────────────────── -->
    <div class="slider-row">
        <label>Letter Spacing:</label>
        <input type="range" id="letter-spacing" min="0" max="20" value="0" />
        <span class="slider-val" id="ls-val">0px</span>
    </div>

    <!-- ── Letter-size slider ────────────────────────────────────── -->
    <div class="slider-row">
        <label>Letter Size:</label>
        <input type="range" id="letter-size" min="8" max="80" value="16" />
        <span class="slider-val" id="lsize-val">16px</span>
    </div>

    <!-- ── Output box height slider ──────────────────────────────── -->
    <div class="slider-row">
        <label>Output Box Height:</label>
        <input type="range" id="box-height" min="100" max="500" value="200" />
        <span class="slider-val" id="bh-val">200px</span>
    </div>

    <!-- ── Blend Now button ──────────────────────────────────────── -->
    <div>
        <span>Go:</span>
        <button id="blend-btn">Blend Now</button>
    </div>

    <!-- ── Output area ───────────────────────────────────────────── -->
    <div>
        <div id="output"></div>
    </div>

</body>
</html>
